services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: galerie
      POSTGRES_PASSWORD: galerie
      POSTGRES_DB: galerie
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U galerie"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./client/.env
    environment:
      DATABASE_URL: postgresql://galerie:galerie@db:5432/galerie
    ports:
      - "3000:3000"

volumes:
  db_data:
